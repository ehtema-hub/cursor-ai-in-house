[pytest]
pythonpath = .
testpaths = tests
# Task/project API coverage (full suite). For support ticket tests only, use:
#   pytest -c pytest-support.ini tests/test_support_tickets.py -v
addopts = --cov=app.blueprints.tasks --cov=app.blueprints.projects --cov=app.blueprints.notifications --cov=app.blueprints.auth --cov=app.services --cov=app.tasks --cov=app.models.task --cov=app.models.project --cov=app.models.notification --cov-report=term-missing --cov-fail-under=90
