name: Setup Python dependencies
description: Python venv install with pip cache

inputs:
  working-directory:
    description: Directory containing requirements.txt
    required: false
    default: backend
  requirements-file:
    description: Requirements file name
    required: false
    default: requirements.txt

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: ${{ inputs.working-directory }}/${{ inputs.requirements-file }}
    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ inputs.requirements-file }}
