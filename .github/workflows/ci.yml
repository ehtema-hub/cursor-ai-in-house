name: Full Stack CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  FLASK_ENV: testing

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Build
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Build — Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  backend-build:
    name: Build — Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Flask app loads
        run: python -c "from app import create_app; app = create_app('testing'); assert app is not None"

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: |
            backend/app/
            backend/migrations/
            backend/requirements.txt
            backend/run.py
            backend/celery_worker.py
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Stage 2: Test
  # ---------------------------------------------------------------------------
  frontend-test:
    name: Test — Frontend
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Chromium)
        run: npm run test:e2e:chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  backend-test:
    name: Test — Backend
    runs-on: ubuntu-latest
    needs: backend-build
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          FLASK_ENV: testing
          JWT_SECRET_KEY: ci-test-jwt-secret-key-32chars!!
        run: pytest -q

  # ---------------------------------------------------------------------------
  # Stage 3: Deploy (main branch only)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy — Production
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build, frontend-test, backend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy-frontend.outputs.page_url }}
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app
          path: backend/

      - name: Package release bundle
        run: |
          tar -czf release-bundle.tar.gz dist/ backend/
          ls -lah release-bundle.tar.gz

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: release-bundle.tar.gz
          retention-days: 30

      # Deploy static frontend to GitHub Pages (basic hosting for the React build).
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy frontend to GitHub Pages
        id: deploy-frontend
        uses: actions/deploy-pages@v4

      # Extend with your backend host (Render, Railway, Fly.io, etc.):
      # - name: Deploy backend
      #   env:
      #     DEPLOY_WEBHOOK_URL: ${{ secrets.BACKEND_DEPLOY_WEBHOOK }}
      #   run: curl -fsSL -X POST "$DEPLOY_WEBHOOK_URL"

