name: Full Stack CI/CD (Optimized)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_slot:
        description: Blue-green target slot
        required: false
        default: green
        type: choice
        options: [blue, green]
      force_full:
        description: Run all jobs regardless of changed paths
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  FLASK_ENV: testing
  PERF_THRESHOLD_MS: "500"

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write

jobs:
  # ===========================================================================
  # Path filter — skip unrelated jobs on PRs (~50% savings on focused changes)
  # ===========================================================================
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      docker: ${{ steps.filter.outputs.docker }}
      all: ${{ steps.filter.outputs.all }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'qa-automation/tests/e2e/**'
              - 'qa-suite/ui-tests/**'
            backend:
              - 'backend/**'
            docker:
              - 'frontend/Dockerfile'
              - 'backend/Dockerfile'
              - 'frontend/docker/**'
              - 'frontend/.dockerignore'
            all:
              - '**'

  # ---------------------------------------------------------------------------
  # Security (parallel — npm audit + Snyk + pip-audit + Bandit)
  # ---------------------------------------------------------------------------
  security-npm:
    name: Security — npm audit
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' ||
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-deps
        with:
          working-directory: frontend
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  security-snyk-npm:
    name: Security — Snyk (npm)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      vars.SNYK_ENABLED == 'true' && (
        needs.detect-changes.outputs.frontend == 'true' ||
        github.ref == 'refs/heads/main'
      )
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-deps
        with:
          working-directory: frontend
      - name: Snyk test (npm)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: bash scripts/ci/run-snyk.sh npm --severity-threshold=high

  security-snyk-python:
    name: Security — Snyk (python)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      vars.SNYK_ENABLED == 'true' && (
        needs.detect-changes.outputs.backend == 'true' ||
        github.ref == 'refs/heads/main'
      )
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-deps
      - name: Snyk test (python)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: bash scripts/ci/run-snyk.sh python --file=backend/requirements.txt --severity-threshold=high

  security-python:
    name: Security — pip-audit
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install pip-audit
      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt

  security-sast-bandit:
    name: Security — SAST (Bandit)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install bandit
      - name: Bandit scan (backend)
        run: bandit -r backend/app -lll -q

  # ---------------------------------------------------------------------------
  # Docker build with GHA layer cache (parallel matrix)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker — Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.docker == 'true' ||
      needs.detect-changes.outputs.frontend == 'true' ||
      needs.detect-changes.outputs.backend == 'true' ||
      github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            context: frontend
            file: frontend/Dockerfile
            tag: cursor-frontend:ci
            port: 8080
            container_port: 80
            health_path: /health
          - name: backend
            context: backend
            file: backend/Dockerfile
            tag: cursor-backend:ci
            port: 5000
            container_port: 5000
            health_path: /health
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build image with layer cache
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          load: true
          tags: ${{ matrix.tag }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
      - name: Health smoke (${{ matrix.name }})
        run: |
          if [ "${{ matrix.name }}" = "backend" ]; then
            docker run -d --name smoke-${{ matrix.name }} \
              -e FLASK_ENV=production \
              -e DATABASE_URL=sqlite:////tmp/smoke.db \
              -e JWT_SECRET_KEY=ci-docker-smoke-secret-32chars!! \
              -e SECRET_KEY=ci-docker-smoke-secret-key!! \
              -p ${{ matrix.port }}:${{ matrix.container_port }} \
              ${{ matrix.tag }}
          else
            docker run -d --name smoke-${{ matrix.name }} \
              -p ${{ matrix.port }}:${{ matrix.container_port }} \
              ${{ matrix.tag }}
          fi
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:${{ matrix.port }}${{ matrix.health_path }}" || echo "000")
            if [ "$code" = "200" ]; then
              echo "Docker health check passed (${{ matrix.name }})"
              docker logs smoke-${{ matrix.name }}
              exit 0
            fi
            sleep 2
          done
          docker logs smoke-${{ matrix.name }}
          echo "Docker health check failed (${{ matrix.name }})"
          exit 1

  # ---------------------------------------------------------------------------
  # Build artifacts (parallel with security + docker)
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Build — Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' ||
      github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-deps
        with:
          working-directory: frontend
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 14
          compression-level: 6

  backend-build:
    name: Build — Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-deps
      - run: python -c "from app import create_app; create_app('testing')"
      - uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: |
            backend/app/
            backend/migrations/
            backend/requirements.txt
            backend/run.py
            backend/celery_worker.py
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Tests — parallel shards (Playwright 2×, pytest 3×)
  # ---------------------------------------------------------------------------
  frontend-test:
    name: Test — E2E shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' ||
      github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: qa-automation/tests/e2e
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-deps
        with:
          working-directory: frontend
      - name: Install E2E runner dependencies
        run: npm ci
        working-directory: qa-automation/tests/e2e
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('qa-automation/tests/e2e/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - run: npx playwright install --with-deps chromium
        working-directory: qa-automation/tests/e2e
      - name: E2E shard ${{ matrix.shard }}/2
        run: npx playwright test --project=chromium --shard=${{ matrix.shard }}/2
        working-directory: qa-automation/tests/e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

  backend-test:
    name: Test — Backend (${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        shard: [core, support, commerce]
        include:
          - shard: core
            paths: "tests/test_auth.py tests/test_permissions.py tests/test_projects.py tests/test_tasks.py tests/test_task_service.py tests/test_notifications.py tests/test_cache_service.py tests/test_background_tasks.py tests/test_coverage_extras.py"
          - shard: support
            paths: "tests/test_support_tickets.py tests/test_user_profile_management.py"
          - shard: commerce
            paths: "tests/test_rest_api_suite.py"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-deps
      - name: Run pytest shard
        env:
          FLASK_ENV: testing
          JWT_SECRET_KEY: ci-test-jwt-secret-key-32chars!!
        run: pytest -q --no-cov ${{ matrix.paths }}

  backend-coverage:
    name: Test — Backend coverage
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-deps
      - name: Run full suite with coverage gate
        env:
          FLASK_ENV: testing
          JWT_SECRET_KEY: ci-test-jwt-secret-key-32chars!!
        run: pytest -q

  performance-test:
    name: Test — Performance
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-deps
      - run: pip install gunicorn
      - name: Start API server
        env:
          FLASK_ENV: testing
          JWT_SECRET_KEY: ci-test-jwt-secret-key-32chars!!
        run: |
          gunicorn --bind 127.0.0.1:5000 --workers 1 --timeout 30 "run:app" &
          ready=0
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5000/health; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" != "1" ]; then
            echo "API server failed to start"
            exit 1
          fi
      - name: Run performance smoke test
        run: bash ../scripts/ci/performance-test.sh http://127.0.0.1:5000

  # ---------------------------------------------------------------------------
  # CI gate
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - security-npm
      - security-snyk-npm
      - security-snyk-python
      - security-python
      - security-sast-bandit
      - docker-build
      - frontend-build
      - backend-build
      - frontend-test
      - backend-test
      - backend-coverage
      - performance-test
    if: always()
    steps:
      - name: Verify job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 <<'PY'
          import json, os, sys
          needs = json.loads(os.environ["NEEDS_JSON"])
          allowed = {"success", "skipped"}
          failed = {name: job["result"] for name, job in needs.items()
                    if job.get("result") not in allowed}
          if failed:
              print("CI gate failed:", failed)
              sys.exit(1)
          print("All required jobs passed or were skipped appropriately.")
          PY

  # ---------------------------------------------------------------------------
  # Blue-green deploy + health checks + rollback
  # ---------------------------------------------------------------------------
  deploy-snapshot:
    name: Deploy — Save rollback snapshot
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [ci-gate]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: production-snapshot
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rollback-snapshot
          path: production-snapshot/
          retention-days: 30
          if-no-files-found: ignore

  deploy-green:
    name: Deploy — Green slot
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [ci-gate, deploy-snapshot]
    environment:
      name: production-green
      url: ${{ steps.deploy.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: backend-app
          path: backend/
      - name: Package release
        run: tar -czf release-bundle.tar.gz dist/ backend/
      - uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: release-bundle.tar.gz
          retention-days: 30
      - name: Blue-green deploy (green)
        id: deploy
        uses: ./.github/actions/blue-green-deploy
        with:
          slot: green
          artifact-path: dist/
          health-url: ""
          rollback-on-failure: "true"
      - name: Notify monitoring — deploy started
        env:
          MONITORING_WEBHOOK_URL: ${{ secrets.MONITORING_WEBHOOK_URL }}
          DEPLOY_EVENT: deploy_green
          DEPLOY_STATUS: in_progress
          DEPLOY_SLOT: green
          DEPLOY_URL: ${{ steps.deploy.outputs.page_url }}
        run: bash scripts/ci/notify-monitoring.sh

  deploy-health-check:
    name: Deploy — Health check & promote
    runs-on: ubuntu-latest
    needs: [deploy-green]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ needs.deploy-green.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - name: Production health checks
        env:
          DEPLOY_URL: ${{ needs.deploy-green.outputs.page_url }}
        run: bash scripts/ci/deploy-health-check.sh
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Save production snapshot for rollback
        run: mkdir -p production-snapshot && cp -r dist production-snapshot/
      - uses: actions/upload-artifact@v4
        with:
          name: production-snapshot
          path: production-snapshot/
          retention-days: 30
      - name: Notify monitoring — deploy success
        env:
          MONITORING_WEBHOOK_URL: ${{ secrets.MONITORING_WEBHOOK_URL }}
          DEPLOY_EVENT: deploy_promote
          DEPLOY_STATUS: success
          DEPLOY_SLOT: green
          DEPLOY_URL: ${{ needs.deploy-green.outputs.page_url }}
        run: bash scripts/ci/notify-monitoring.sh

  rollback:
    name: Deploy — Rollback on failure
    runs-on: ubuntu-latest
    needs: [deploy-green, deploy-health-check]
    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production-rollback
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          name: rollback-snapshot
          path: rollback/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: production-snapshot
          path: rollback/
        continue-on-error: true
      - name: Rollback to previous snapshot
        run: |
          if [ -d rollback/dist ]; then
            echo "Rolling back to previous production snapshot"
            ls -la rollback/dist/
          else
            echo "No rollback snapshot available"
            exit 1
          fi
      - name: Redeploy rollback artifact
        uses: ./.github/actions/blue-green-deploy
        with:
          slot: blue
          artifact-path: rollback/dist
          health-url: ""
          rollback-on-failure: "false"
      - name: Notify monitoring — rollback
        env:
          MONITORING_WEBHOOK_URL: ${{ secrets.MONITORING_WEBHOOK_URL }}
          DEPLOY_EVENT: rollback
          DEPLOY_STATUS: failure
          DEPLOY_SLOT: blue
        run: bash scripts/ci/notify-monitoring.sh

  # ---------------------------------------------------------------------------
  # Slack notifications on failure
  # ---------------------------------------------------------------------------
  notify-slack:
    name: Notify — Slack
    runs-on: ubuntu-latest
    needs:
      - ci-gate
      - security-npm
      - security-snyk-npm
      - security-snyk-python
      - security-python
      - security-sast-bandit
      - docker-build
      - frontend-build
      - backend-build
      - frontend-test
      - backend-test
      - backend-coverage
      - performance-test
      - deploy-green
      - deploy-health-check
      - rollback
    if: always() && contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@v7
      - name: Collect failed jobs
        id: failed
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          FAILED=$(python3 -c "
          import json, os
          needs = json.loads(os.environ['NEEDS_JSON'])
          print(', '.join(k for k,v in needs.items() if v.get('result') in ('failure','cancelled')) or 'unknown')
          ")
          echo "jobs=$FAILED" >> "$GITHUB_OUTPUT"
      - name: Send Slack alert
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTIFY_STATUS: failure
          FAILED_JOBS: ${{ steps.failed.outputs.jobs }}
        run: bash scripts/ci/notify-slack.sh

