name: Full Stack CI/CD (Optimized)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_slot:
        description: Blue-green target slot
        required: false
        default: green
        type: choice
        options: [blue, green]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  FLASK_ENV: testing
  PERF_THRESHOLD_MS: "500"

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write

jobs:
  # ===========================================================================
  # Bottleneck fix: security + builds start in parallel (was sequential gates)
  # ===========================================================================

  security-dependencies:
    name: Security — Dependency audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ecosystem: npm
            path: .
          - ecosystem: pip
            path: backend
    steps:
      - uses: actions/checkout@v4

      - name: npm audit
        if: matrix.ecosystem == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
        if: matrix.ecosystem == 'npm'
      - name: Run npm audit (high+)
        if: matrix.ecosystem == 'npm'
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: pip-audit
        if: matrix.ecosystem == 'pip'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install pip-audit
        if: matrix.ecosystem == 'pip'
        run: pip install pip-audit
      - name: Audit Python dependencies
        if: matrix.ecosystem == 'pip'
        working-directory: backend
        run: pip-audit -r requirements.txt

  security-sast-bandit:
    name: Security — SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install bandit
      - name: Bandit scan (backend)
        run: bandit -r backend/app -ll -q -f json -o bandit-report.json || true
      - name: Fail on high severity
        run: bandit -r backend/app -lll -q

  # ---------------------------------------------------------------------------
  # Stage 1: Build (parallel)
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Build — Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 14
          compression-level: 6

  backend-build:
    name: Build — Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: python -c "from app import create_app; create_app('testing')"
      - uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: |
            backend/app/
            backend/migrations/
            backend/requirements.txt
            backend/run.py
            backend/celery_worker.py
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Stage 2: Test (parallel shards — bottleneck fix: single pytest job ~2min)
  # ---------------------------------------------------------------------------
  frontend-test:
    name: Test — Frontend E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - run: npx playwright install --with-deps chromium
      - name: E2E (parallel workers in CI)
        run: npm run test:e2e:chromium
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  backend-test:
    name: Test — Backend (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [core, support, commerce]
        include:
          - shard: core
            paths: "tests/test_auth.py tests/test_permissions.py tests/test_projects.py tests/test_tasks.py tests/test_task_service.py tests/test_notifications.py tests/test_cache_service.py tests/test_background_tasks.py tests/test_coverage_extras.py"
          - shard: support
            paths: "tests/test_support_tickets.py tests/test_user_profile_management.py"
          - shard: commerce
            paths: "tests/test_rest_api_suite.py"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest shard
        env:
          FLASK_ENV: testing
          JWT_SECRET_KEY: ci-test-jwt-secret-key-32chars!!
        run: pytest -q ${{ matrix.paths }}

  performance-test:
    name: Test — Performance
    runs-on: ubuntu-latest
    needs: [backend-build]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          pip install -r requirements.txt
          pip install gunicorn
      - name: Start API server
        env:
          FLASK_ENV: testing
          JWT_SECRET_KEY: ci-test-jwt-secret-key-32chars!!
        run: |
          gunicorn --bind 127.0.0.1:5000 --workers 2 --timeout 30 "run:app" &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:5000/health && break
            sleep 1
          done
      - name: Run performance smoke test
        run: bash ../scripts/ci/performance-test.sh http://127.0.0.1:5000

  # ---------------------------------------------------------------------------
  # CI gate — all quality checks must pass before deploy
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - security-dependencies
      - security-sast-bandit
      - frontend-build
      - backend-build
      - frontend-test
      - backend-test
      - performance-test
    steps:
      - run: echo "All build, security, and test jobs passed."

  # ---------------------------------------------------------------------------
  # Stage 3: Blue-green deploy + rollback + monitoring
  # ---------------------------------------------------------------------------
  deploy-snapshot:
    name: Deploy — Save rollback snapshot
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [ci-gate]
    steps:
      - name: Download previous production snapshot (for rollback)
        uses: actions/download-artifact@v4
        with:
          name: production-snapshot
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rollback-snapshot
          path: production-snapshot/
          retention-days: 30
          if-no-files-found: ignore

  deploy-green:
    name: Deploy — Green slot
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [ci-gate, deploy-snapshot]
    environment:
      name: production-green
      url: ${{ steps.deploy.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: backend-app
          path: backend/
      - name: Package release
        run: tar -czf release-bundle.tar.gz dist/ backend/
      - uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: release-bundle.tar.gz
          retention-days: 30
      - name: Blue-green deploy (green)
        id: deploy
        uses: ./.github/actions/blue-green-deploy
        with:
          slot: green
          artifact-path: dist/
          health-url: ""
          rollback-on-failure: "true"
      - name: Notify monitoring — deploy started
        env:
          MONITORING_WEBHOOK_URL: ${{ secrets.MONITORING_WEBHOOK_URL }}
          DEPLOY_EVENT: deploy_green
          DEPLOY_STATUS: in_progress
          DEPLOY_SLOT: green
          DEPLOY_URL: ${{ steps.deploy.outputs.page_url }}
        run: bash scripts/ci/notify-monitoring.sh

  deploy-health-check:
    name: Deploy — Health check & promote
    runs-on: ubuntu-latest
    needs: [deploy-green]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ needs.deploy-green.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test deployed frontend
        run: |
          URL="${{ needs.deploy-green.outputs.page_url }}"
          if [ -z "$URL" ]; then
            echo "No deployment URL — skipping URL check"
            exit 0
          fi
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL" || echo "000")
            if [ "$code" = "200" ]; then
              echo "Production health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Production health check failed"
          exit 1
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Save production snapshot for rollback
        run: mkdir -p production-snapshot && cp -r dist production-snapshot/
      - uses: actions/upload-artifact@v4
        with:
          name: production-snapshot
          path: production-snapshot/
          retention-days: 30
      - name: Notify monitoring — deploy success
        env:
          MONITORING_WEBHOOK_URL: ${{ secrets.MONITORING_WEBHOOK_URL }}
          DEPLOY_EVENT: deploy_promote
          DEPLOY_STATUS: success
          DEPLOY_SLOT: green
          DEPLOY_URL: ${{ needs.deploy-green.outputs.page_url }}
        run: bash scripts/ci/notify-monitoring.sh

  rollback:
    name: Deploy — Rollback on failure
    runs-on: ubuntu-latest
    needs: [deploy-green, deploy-health-check]
    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production-rollback
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: rollback-snapshot
          path: rollback/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: production-snapshot
          path: rollback/
        continue-on-error: true
      - name: Rollback to previous snapshot
        run: |
          if [ -d rollback/dist ]; then
            echo "Rolling back to previous production snapshot"
            ls -la rollback/dist/
          else
            echo "No rollback snapshot available"
            exit 1
          fi
      - name: Redeploy rollback artifact
        uses: ./.github/actions/blue-green-deploy
        with:
          slot: blue
          artifact-path: rollback/dist
          health-url: ""
          rollback-on-failure: "false"
      - name: Notify monitoring — rollback
        env:
          MONITORING_WEBHOOK_URL: ${{ secrets.MONITORING_WEBHOOK_URL }}
          DEPLOY_EVENT: rollback
          DEPLOY_STATUS: failure
          DEPLOY_SLOT: blue
        run: bash scripts/ci/notify-monitoring.sh
